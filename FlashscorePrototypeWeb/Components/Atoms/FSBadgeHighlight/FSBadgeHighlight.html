<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSBadgeHighlight - Atom Component</title>
    <link rel="stylesheet" href="FSBadgeHighlight.css">
</head>
<body>
    <div class="demo-container">
        <h1>FSBadgeHighlight</h1>
        <p>Live highlight badge with optional icon. Used to indicate live/active states.</p>

        <!-- ================================= -->
        <!-- Text only variant                 -->
        <!-- ================================= -->
        <h2>Text only (default)</h2>
        <div class="demo-list">
            <div class="fs-badge-highlight">
                <span class="fs-badge-highlight__text">Live</span>
            </div>
        </div>

        <!-- ================================= -->
        <!-- With icon variant                 -->
        <!-- ================================= -->
        <h2>With icon</h2>
        <div class="demo-list">
            <div class="fs-badge-highlight">
                <img src="../../../Assets/Icons/Action/Video/Play ALT.svg" alt="" class="fs-badge-highlight__icon">
                <span class="fs-badge-highlight__text">Live</span>
            </div>
        </div>

        <!-- ================================= -->
        <!-- Different text examples           -->
        <!-- ================================= -->
        <h2>Different text examples</h2>
        <div class="demo-list">
            <div class="fs-badge-highlight">
                <span class="fs-badge-highlight__text">New</span>
            </div>

            <div class="fs-badge-highlight">
                <span class="fs-badge-highlight__text">Hot</span>
            </div>

            <div class="fs-badge-highlight">
                <span class="fs-badge-highlight__text">Trending</span>
            </div>
        </div>

    </div>
</body>
</html>
