<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSAudioButton - Atom Component</title>
    <link rel="stylesheet" href="FSAudioButton.css">
</head>
<body>
    <div class="demo-container">
        <h1>FSAudioButton</h1>
        <p>Audio button with icon and label. Used to link to audio content or audio commentary.</p>

        <!-- ================================= -->
        <!-- Base State                        -->
        <!-- ================================= -->
        <h2>Base</h2>
        <div class="demo-row">
            <a href="#" class="fs-audio-button">
                <img src="../../../Assets/Icons/Incidents/Audio.svg" alt="" class="fs-audio-button__icon">
                <span class="fs-audio-button__label">Audio</span>
            </a>
        </div>

        <!-- ================================= -->
        <!-- Different Labels                  -->
        <!-- ================================= -->
        <h2>Different Labels</h2>
        <div class="demo-row">
            <a href="#" class="fs-audio-button">
                <img src="../../../Assets/Icons/Incidents/Audio.svg" alt="" class="fs-audio-button__icon">
                <span class="fs-audio-button__label">Listen Live</span>
            </a>

            <a href="#" class="fs-audio-button">
                <img src="../../../Assets/Icons/Incidents/Audio.svg" alt="" class="fs-audio-button__icon">
                <span class="fs-audio-button__label">Commentary</span>
            </a>

            <a href="#" class="fs-audio-button">
                <img src="../../../Assets/Icons/Incidents/Audio.svg" alt="" class="fs-audio-button__icon">
                <span class="fs-audio-button__label">Audio Stream</span>
            </a>
        </div>

        <!-- ================================= -->
        <!-- Interactive States                -->
        <!-- ================================= -->
        <h2>Interactive States</h2>
        <p style="font-size: 13px; color: #555E61; margin: 0 0 8px;">Hover and click the buttons below to see state changes.</p>
        <div class="demo-row">
            <a href="#" class="fs-audio-button">
                <img src="../../../Assets/Icons/Incidents/Audio.svg" alt="" class="fs-audio-button__icon">
                <span class="fs-audio-button__label">Hover Me</span>
            </a>

            <a href="#" class="fs-audio-button">
                <img src="../../../Assets/Icons/Incidents/Audio.svg" alt="" class="fs-audio-button__icon">
                <span class="fs-audio-button__label">Click Me</span>
            </a>
        </div>

    </div>
</body>
</html>
