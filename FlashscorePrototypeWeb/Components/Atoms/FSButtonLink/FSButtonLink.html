<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSButtonLink - Atom Component</title>
    <link rel="stylesheet" href="FSButtonLink.css">
</head>
<body>
    <div class="demo-container">
        <h1>FSButtonLink</h1>
        <p>Text link with trailing right arrow icon. Four variants: Primary, Secondary, Tertiary, and Inversed.</p>

        <h2>Primary</h2>
        <div class="demo-list">
            <a href="#" class="fs-button-link fs-button-link--primary">
                <span class="fs-button-link__label">Show more</span>
                <img src="../../../Assets/Icons/Action/Navigation/Arrow/Right.svg" alt="" class="fs-button-link__icon">
            </a>

            <button type="button" class="fs-button-link fs-button-link--primary">
                <span class="fs-button-link__label">{Label}</span>
                <img src="../../../Assets/Icons/Action/Navigation/Arrow/Right.svg" alt="" class="fs-button-link__icon">
            </button>
        </div>

        <h2>Secondary</h2>
        <div class="demo-list">
            <a href="#" class="fs-button-link fs-button-link--secondary">
                <span class="fs-button-link__label">View details</span>
                <img src="../../../Assets/Icons/Action/Navigation/Arrow/Right.svg" alt="" class="fs-button-link__icon">
            </a>

            <button type="button" class="fs-button-link fs-button-link--secondary">
                <span class="fs-button-link__label">{Label}</span>
                <img src="../../../Assets/Icons/Action/Navigation/Arrow/Right.svg" alt="" class="fs-button-link__icon">
            </button>
        </div>

        <h2>Tertiary</h2>
        <div class="demo-list">
            <a href="#" class="fs-button-link fs-button-link--tertiary">
                <span class="fs-button-link__label">Load more</span>
                <img src="../../../Assets/Icons/Action/Navigation/Arrow/Right.svg" alt="" class="fs-button-link__icon">
            </a>

            <button type="button" class="fs-button-link fs-button-link--tertiary">
                <span class="fs-button-link__label">{Label}</span>
                <img src="../../../Assets/Icons/Action/Navigation/Arrow/Right.svg" alt="" class="fs-button-link__icon">
            </button>
        </div>

        <h2>Inversed</h2>
        <div class="demo-section--dark">
            <div class="demo-list">
                <a href="#" class="fs-button-link fs-button-link--inversed">
                    <span class="fs-button-link__label">See all</span>
                    <img src="../../../Assets/Icons/Action/Navigation/Arrow/Right.svg" alt="" class="fs-button-link__icon">
                </a>

                <button type="button" class="fs-button-link fs-button-link--inversed">
                    <span class="fs-button-link__label">{Label}</span>
                    <img src="../../../Assets/Icons/Action/Navigation/Arrow/Right.svg" alt="" class="fs-button-link__icon">
                </button>
            </div>
        </div>

    </div>
</body>
</html>
