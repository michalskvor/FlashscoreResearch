<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSBadgeInfo - Atom Component</title>
    <link rel="stylesheet" href="FSBadgeInfo.css">
    <style>
        body { background: #F5F5F5; padding: 32px; font-family: sans-serif; }
        h1 { font-size: 18px; color: #001E28; margin-bottom: 4px; }
        h2 { font-size: 12px; color: #999; font-weight: 400; margin: 24px 0 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .demo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .demo-label { font-size: 11px; color: #555E61; width: 120px; flex-shrink: 0; }
        .demo-bg-dark { background: #333; padding: 8px; border-radius: 4px; display: inline-flex; }
    </style>
</head>
<body>

    <h1>FSBadgeInfo</h1>

    <!-- ── Primary variant ───────────────────────────────────────── -->
    <h2>Primary — 20×20px grey, position number</h2>

    <div class="demo-row">
        <span class="demo-label">Position "1."</span>
        <div class="fs-badge-info fs-badge-info--primary">
            <span class="fs-badge-info__text">1.</span>
        </div>
    </div>

    <div class="demo-row">
        <span class="demo-label">Position "2."</span>
        <div class="fs-badge-info fs-badge-info--primary">
            <span class="fs-badge-info__text">2.</span>
        </div>
    </div>

    <div class="demo-row">
        <span class="demo-label">Position "10."</span>
        <div class="fs-badge-info fs-badge-info--primary">
            <span class="fs-badge-info__text">10.</span>
        </div>
    </div>

    <!-- ── Secondary variant ─────────────────────────────────────── -->
    <h2>Secondary — 20×20px grey, no text</h2>

    <div class="demo-row">
        <span class="demo-label">Empty badge</span>
        <div class="fs-badge-info fs-badge-info--secondary"></div>
    </div>

    <!-- ── Tertiary variant ───────────────────────────────────────── -->
    <h2>Tertiary — dark bg, short label</h2>

    <div class="demo-row">
        <span class="demo-label">Label "1"</span>
        <div class="fs-badge-info fs-badge-info--tertiary">
            <span class="fs-badge-info__text">1</span>
        </div>
    </div>

    <div class="demo-row">
        <span class="demo-label">Label "2X"</span>
        <div class="fs-badge-info fs-badge-info--tertiary">
            <span class="fs-badge-info__text">2X</span>
        </div>
    </div>

    <div class="demo-row">
        <span class="demo-label">Label "OT"</span>
        <div class="fs-badge-info fs-badge-info--tertiary">
            <span class="fs-badge-info__text">OT</span>
        </div>
    </div>

    <div class="demo-row">
        <span class="demo-label">Label "PEN"</span>
        <div class="fs-badge-info fs-badge-info--tertiary">
            <span class="fs-badge-info__text">PEN</span>
        </div>
    </div>

</body>
</html>
