<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSButtonStream - Atom Component</title>
    <link rel="stylesheet" href="FSButtonStream.css">
</head>
<body>
    <div class="demo-container">
        <h1>FSButtonStream</h1>
        <p>Streaming badge button with external link icon. Used to indicate a live stream source.</p>

        <!-- ================================= -->
        <!-- VARIANT: Textlink Boxed (default) -->
        <!-- ================================= -->
        <h2>Textlink Boxed (default)</h2>
        <div class="demo-row">
            <a href="#" class="fs-button-stream">
                <span class="fs-button-stream__label">DAZN</span>
                <img src="../../../Assets/Icons/Action/External link.svg" alt="" class="fs-button-stream__icon">
            </a>
        </div>

        <!-- ================================= -->
        <!-- VARIANT: Textlink Boxed Multiple  -->
        <!-- ================================= -->
        <h2>Textlink Boxed - Multiple</h2>
        <div class="demo-row">
            <a href="#" class="fs-button-stream">
                <span class="fs-button-stream__label">DAZN</span>
                <img src="../../../Assets/Icons/Action/External link.svg" alt="" class="fs-button-stream__icon">
            </a>
            <a href="#" class="fs-button-stream">
                <span class="fs-button-stream__label">Sky Sports</span>
                <img src="../../../Assets/Icons/Action/External link.svg" alt="" class="fs-button-stream__icon">
            </a>
            <a href="#" class="fs-button-stream">
                <span class="fs-button-stream__label">TNT Sports</span>
                <img src="../../../Assets/Icons/Action/External link.svg" alt="" class="fs-button-stream__icon">
            </a>
        </div>

        <!-- ================================= -->
        <!-- VARIANT: Textlink                 -->
        <!-- ================================= -->
        <h2>Textlink</h2>
        <div class="demo-row">
            <a href="#" class="fs-button-stream fs-button-stream--textlink">
                <span class="fs-button-stream__label">DAZN</span>
                <img src="../../../Assets/Icons/Action/External link.svg" alt="" class="fs-button-stream__icon">
            </a>
        </div>

        <!-- ================================= -->
        <!-- VARIANT: Textlink Multiple        -->
        <!-- ================================= -->
        <h2>Textlink - Multiple</h2>
        <div class="demo-row">
            <a href="#" class="fs-button-stream fs-button-stream--textlink">
                <span class="fs-button-stream__label">DAZN,</span>
                <img src="../../../Assets/Icons/Action/External link.svg" alt="" class="fs-button-stream__icon">
            </a>
            <a href="#" class="fs-button-stream fs-button-stream--textlink">
                <span class="fs-button-stream__label">Sky Sports,</span>
                <img src="../../../Assets/Icons/Action/External link.svg" alt="" class="fs-button-stream__icon">
            </a>
            <a href="#" class="fs-button-stream fs-button-stream--textlink">
                <span class="fs-button-stream__label">TNT Sports</span>
                <img src="../../../Assets/Icons/Action/External link.svg" alt="" class="fs-button-stream__icon">
            </a>
        </div>
    </div>
</body>
</html>
