<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSBadgeMeta Component</title>
    <link rel="stylesheet" href="FSBadgeMeta.css">
</head>
<body>
    <!-- Demo container -->
    <div class="demo-container">
        <h1>FSBadgeMeta Component</h1>

        <h2>Alert Variant</h2>
        <p>Use for urgent, time-sensitive information that requires immediate attention</p>

        <div class="fs-badge-meta fs-badge-meta--alert">
            <span class="fs-badge-meta__text">Live</span>
        </div>

        <div class="fs-badge-meta fs-badge-meta--alert">
            <span class="fs-badge-meta__text">Breaking News</span>
        </div>

        <div class="fs-badge-meta fs-badge-meta--alert">
            <span class="fs-badge-meta__text">Urgent</span>
        </div>

        <h2>Base Variant</h2>
        <p>Use for general informational labels and metadata</p>

        <div class="fs-badge-meta fs-badge-meta--base">
            <span class="fs-badge-meta__text">{Label}</span>
        </div>

        <div class="fs-badge-meta fs-badge-meta--base">
            <span class="fs-badge-meta__text">Info</span>
        </div>

        <div class="fs-badge-meta fs-badge-meta--base">
            <span class="fs-badge-meta__text">Category</span>
        </div>

        <div class="fs-badge-meta fs-badge-meta--base">
            <span class="fs-badge-meta__text">Featured</span>
        </div>
    </div>
</body>
</html>
