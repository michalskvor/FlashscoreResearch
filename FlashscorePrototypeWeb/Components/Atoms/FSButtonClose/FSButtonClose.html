<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSButtonClose - Atom Component</title>
    <link rel="stylesheet" href="FSButtonClose.css">
</head>
<body>
    <div class="demo-container">
        <h1>FSButtonClose</h1>
        <p>Close button with two size variants: Large (16px icon) and Small (12px icon). Icon color changes on hover.</p>

        <!-- ================================= -->
        <!-- Large variant                     -->
        <!-- ================================= -->
        <h2>Large variant (16px icon)</h2>
        <div class="demo-list">
            <div class="demo-box">
                <button class="fs-button-close" aria-label="Close">
                    <img src="../../../Assets/Icons/Action/Navigation/Close.svg" alt="" class="fs-button-close__icon">
                </button>
            </div>
        </div>

        <!-- ================================= -->
        <!-- Small variant                     -->
        <!-- ================================= -->
        <h2>Small variant (12px icon)</h2>
        <div class="demo-list">
            <div class="demo-box">
                <button class="fs-button-close fs-button-close--small" aria-label="Close">
                    <img src="../../../Assets/Icons/Action/Navigation/Close.svg" alt="" class="fs-button-close__icon">
                </button>
            </div>
        </div>

        <!-- ================================= -->
        <!-- Both variants side by side        -->
        <!-- ================================= -->
        <h2>Both variants</h2>
        <div class="demo-list">
            <div class="demo-box">
                <button class="fs-button-close" aria-label="Close">
                    <img src="../../../Assets/Icons/Action/Navigation/Close.svg" alt="" class="fs-button-close__icon">
                </button>
                <span style="color: #999999; font-size: 12px;">Large</span>
            </div>
            <div class="demo-box">
                <button class="fs-button-close fs-button-close--small" aria-label="Close">
                    <img src="../../../Assets/Icons/Action/Navigation/Close.svg" alt="" class="fs-button-close__icon">
                </button>
                <span style="color: #999999; font-size: 12px;">Small</span>
            </div>
        </div>

    </div>
</body>
</html>
