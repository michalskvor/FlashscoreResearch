<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSWidgetHeadersMatch - Mobile</title>
    <link rel="stylesheet" href="../../../Atoms/FSAssetBoxed/FSAssetBoxed.css">
    <link rel="stylesheet" href="../../../Atoms/FSActionsFavorite/FSActionsFavorite.css">
    <link rel="stylesheet" href="../../../Atoms/FSBadgeStream/FSBadgeStream.css">
    <link rel="stylesheet" href="FSWidgetHeadersMatch-mobile.css">
</head>
<body style="padding: 24px; background: #EEEEEE; max-width: 639px;">

    <!-- Example 1: Finished Match -->
    <div class="fs-widget-headers-match-mobile">
        <div class="fs-widget-headers-match-mobile__date-container">
            <p class="fs-widget-headers-match-mobile__date">15.04.2023 01:10</p>
        </div>
        <div class="fs-widget-headers-match-mobile__content">

            <!-- Home Participant -->
            <div class="fs-widget-headers-match-mobile__participant fs-widget-headers-match-mobile__participant--home">
                <div class="fs-widget-headers-match-mobile__participant-icons">
                    <div class="fs-widget-headers-match-mobile__empty-cell"></div>
                    <div class="fs-widget-headers-match-mobile__participant-icons-center">
                        <div class="fs-widget-headers-match-mobile__favorite">
                            <div class="fs-actions-favorite fs-actions-favorite--large fs-actions-favorite--active">
                                <svg class="fs-actions-favorite__icon" width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M9.346 0L7.245 6.847L0.404 6.832L0 8.141L5.544 12.354L3.415 19.191L4.473 20L9.999 15.758L15.526 20L16.584 19.191L14.455 12.354L19.999 8.141L19.596 6.832L12.753 6.847L10.654 0H9.346Z" fill="#FFCD00"/>
                                </svg>
                            </div>
                        </div>
                        <div class="fs-asset-boxed fs-asset-boxed--52px fs-asset-boxed--asset">
                            <img src="../../../../Assets/TeamLogos/Premier league/Man city.png" alt="Denver Nuggets" class="fs-asset-boxed__image fs-asset-boxed__image--asset">
                        </div>
                        <div class="fs-widget-headers-match-mobile__serve"></div>
                    </div>
                    <div class="fs-widget-headers-match-mobile__empty-cell"></div>
                </div>
                <div class="fs-widget-headers-match-mobile__participant-info">
                    <div class="fs-widget-headers-match-mobile__participant-name">
                        <img src="../../../../Assets/Icons/Incidents/Next stage.svg" alt="" class="fs-widget-headers-match-mobile__next-stage-icon">
                        <p class="fs-widget-headers-match-mobile__participant-text fs-widget-headers-match-mobile__participant-text--bold">Denver Nuggets</p>
                    </div>
                </div>
            </div>

            <!-- Score Container -->
            <div class="fs-widget-headers-match-mobile__score-container">
                <div class="fs-widget-headers-match-mobile__score-content">
                    <div class="fs-widget-headers-match-mobile__score-home">102</div>
                    <div class="fs-widget-headers-match-mobile__score-separator">-</div>
                    <div class="fs-widget-headers-match-mobile__score-away">91</div>
                </div>
                <div class="fs-widget-headers-match-mobile__state">
                    <p class="fs-widget-headers-match-mobile__state-text">FINISHED</p>
                </div>
            </div>

            <!-- Away Participant -->
            <div class="fs-widget-headers-match-mobile__participant fs-widget-headers-match-mobile__participant--away">
                <div class="fs-widget-headers-match-mobile__participant-icons">
                    <div class="fs-widget-headers-match-mobile__empty-cell"></div>
                    <div class="fs-widget-headers-match-mobile__participant-icons-center">
                        <div class="fs-widget-headers-match-mobile__serve"></div>
                        <div class="fs-asset-boxed fs-asset-boxed--52px fs-asset-boxed--asset">
                            <img src="../../../../Assets/TeamLogos/Premier league/Fulham.png" alt="Chicago Bulls" class="fs-asset-boxed__image fs-asset-boxed__image--asset">
                        </div>
                        <div class="fs-widget-headers-match-mobile__favorite">
                            <div class="fs-actions-favorite fs-actions-favorite--large fs-actions-favorite--base">
                                <svg class="fs-actions-favorite__icon" width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M9.346 0L7.245 6.847L0.404 6.832L0 8.141L5.544 12.354L3.415 19.191L4.473 20L9.999 15.758L15.526 20L16.584 19.191L14.455 12.354L19.999 8.141L19.596 6.832L12.753 6.847L10.654 0H9.346ZM8.399 7.793L9.999 2.575L11.6 7.793L12.256 8.293L17.468 8.282L13.245 11.493L12.994 12.302L14.616 17.511L10.404 14.281H9.594L5.384 17.511L7.005 12.302L6.754 11.493L2.53 8.282L7.744 8.293L8.399 7.793Z" fill="#999999"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                    <div class="fs-widget-headers-match-mobile__empty-cell"></div>
                </div>
                <div class="fs-widget-headers-match-mobile__participant-info">
                    <div class="fs-widget-headers-match-mobile__participant-name">
                        <p class="fs-widget-headers-match-mobile__participant-text">Chicago Bulls</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <br>

    <!-- Example 2: Live Match -->
    <div class="fs-widget-headers-match-mobile fs-widget-headers-match-mobile--live">
        <div class="fs-widget-headers-match-mobile__date-container">

        </div>
        <div class="fs-widget-headers-match-mobile__content">

                        <div class="fs-asset-boxed fs-asset-boxed--52px fs-asset-boxed--asset">

                        <p class="fs-widget-headers-match-mobile__participant-text">Manchester City</p>

                </div>
            </div>

            <!-- Score Container -->
            <div class="fs-widget-headers-match-mobile__score-container">
                <div class="fs-widget-headers-match-mobile__score-content">
                    <div class="fs-widget-headers-match-mobile__score-home">2</div>
                    <div class="fs-widget-headers-match-mobile__score-separator">-</div>
                    <div class="fs-widget-headers-match-mobile__score-away">1</div>
                </div>
                <div class="fs-widget-headers-match-mobile__state">
                    <div class="fs-widget-headers-match-mobile__live-info">
                        <p class="fs-widget-headers-match-mobile__live-period">2ND HALF</p>
                        <div class="fs-widget-headers-match-mobile__live-time">
                            <span class="fs-widget-headers-match-mobile__live-minutes">65'</span>
                        </div>
                    </div>
                </div>
                <!-- Live Stream Badge -->
                <div class="fs-badge-stream fs-badge-stream--live">
                    <img src="../../../../Assets/Icons/Action/Video/Play ALT.svg" alt="" class="fs-badge-stream__icon">
                    <span class="fs-badge-stream__text">Live Stream</span>
                </div>
            </div>

            <!-- Away Participant -->
            <div class="fs-widget-headers-match-mobile__participant fs-widget-headers-match-mobile__participant--away">
                <div class="fs-widget-headers-match-mobile__participant-icons">
                    <div class="fs-widget-headers-match-mobile__empty-cell"></div>
                    <div class="fs-widget-headers-match-mobile__participant-icons-center">
                        <div class="fs-widget-headers-match-mobile__serve"></div>
                        <div class="fs-asset-boxed fs-asset-boxed--52px fs-asset-boxed--asset">
                            <img src="../../../../Assets/TeamLogos/Premier league/Fulham.png" alt="Fulham" class="fs-asset-boxed__image fs-asset-boxed__image--asset">
                        </div>
                        <div class="fs-widget-headers-match-mobile__favorite">
                            <div class="fs-actions-favorite fs-actions-favorite--large fs-actions-favorite--base">
                                <svg class="fs-actions-favorite__icon" width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M9.346 0L7.245 6.847L0.404 6.832L0 8.141L5.544 12.354L3.415 19.191L4.473 20L9.999 15.758L15.526 20L16.584 19.191L14.455 12.354L19.999 8.141L19.596 6.832L12.753 6.847L10.654 0H9.346ZM8.399 7.793L9.999 2.575L11.6 7.793L12.256 8.293L17.468 8.282L13.245 11.493L12.994 12.302L14.616 17.511L10.404 14.281H9.594L5.384 17.511L7.005 12.302L6.754 11.493L2.53 8.282L7.744 8.293L8.399 7.793Z" fill="#999999"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                    <div class="fs-widget-headers-match-mobile__empty-cell"></div>
                </div>
                <div class="fs-widget-headers-match-mobile__participant-info">
                    <div class="fs-widget-headers-match-mobile__participant-name">
                        <p class="fs-widget-headers-match-mobile__participant-text">Fulham</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <br>

    <!-- Example 3: Scheduled (Pre-Match) -->
    <div class="fs-widget-headers-match-mobile">
        <div class="fs-widget-headers-match-mobile__date-container">
            <p class="fs-widget-headers-match-mobile__date">15.02.2025 20:00</p>

                        <p class="fs-widget-headers-match-mobile__participant-text">Manchester City</p>
