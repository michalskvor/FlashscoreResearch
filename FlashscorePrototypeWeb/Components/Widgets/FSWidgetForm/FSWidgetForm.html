<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSWidgetForm - Widget Component</title>
    <link rel="stylesheet" href="../../Molecules/FSHeadersSection/FSHeadersSection.css">
    <link rel="stylesheet" href="../../Atoms/FSAssetBoxed/FSAssetBoxed.css">
    <link rel="stylesheet" href="../../Atoms/FSBadgeInfo/FSBadgeInfo.css">
    <link rel="stylesheet" href="../../Atoms/FSBadgeForm/FSBadgeForm.css">
    <link rel="stylesheet" href="FSWidgetForm.css">
</head>
<body style="padding: 16px; background: #FFFFFF; max-width: 639px;">

    <!-- FSWidgetForm Widget -->
    <div class="fs-widget-form">

        <!-- Section Header -->
        <div class="fs-headers-section">
            <div class="fs-headers-section__left">
                <span class="fs-headers-section__text">Form</span>
            </div>
            <div class="fs-headers-section__center"></div>
            <div class="fs-headers-section__right"></div>
        </div>

        <!-- Body -->
        <div class="fs-widget-form__body">

            <div class="fs-widget-form__teams">

                <!-- Left Team -->
                <div class="fs-widget-form__team fs-widget-form__team--left">

                    <!-- Position Badge -->
                    <div class="fs-badge-info fs-badge-info--primary">
                        <span class="fs-badge-info__text">2.</span>
                    </div>

                    <!-- Team Asset -->
                    <div class="fs-widget-form__asset">
                        <div class="fs-asset-boxed fs-asset-boxed--42px fs-asset-boxed--asset">
                            <img class="fs-asset-boxed__image fs-asset-boxed__image--asset"
                                 src="../../../Assets/TeamLogos/Premier league/Liverpool.png" alt="Liverpool">
                        </div>
                    </div>

                    <!-- Team Name -->
                    <span class="fs-widget-form__team-name">Liverpool</span>

                    <!-- Form Badges Row -->
                    <div class="fs-widget-form__form-row">
                        <div class="fs-badge-form fs-badge-form--unknown">
                            <span class="fs-badge-form__text">?</span>
                        </div>
                        <div class="fs-badge-form fs-badge-form--win">
                            <span class="fs-badge-form__text">W</span>
                        </div>
                        <div class="fs-badge-form fs-badge-form--win">
                            <span class="fs-badge-form__text">W</span>
                        </div>
                        <div class="fs-badge-form fs-badge-form--win">
                            <span class="fs-badge-form__text">W</span>
                        </div>
                        <div class="fs-badge-form fs-badge-form--win">
                            <span class="fs-badge-form__text">W</span>
                        </div>
                        <div class="fs-badge-form fs-badge-form--win">
                            <span class="fs-badge-form__text">W</span>
                        </div>
                    </div>

                </div>

                <!-- VS Icon -->
                <div class="fs-widget-form__vs">
                    <div class="fs-widget-form__vs-bg"></div>
                    <span class="fs-widget-form__vs-text">VS</span>
                </div>

                <!-- Right Team -->
                <div class="fs-widget-form__team fs-widget-form__team--right">

                    <!-- Position Badge -->
                    <div class="fs-badge-info fs-badge-info--primary">
                        <span class="fs-badge-info__text">1.</span>
                    </div>

                    <!-- Team Asset -->
                    <div class="fs-widget-form__asset">
                        <div class="fs-asset-boxed fs-asset-boxed--42px fs-asset-boxed--asset">
                            <img class="fs-asset-boxed__image fs-asset-boxed__image--asset"
                                 src="../../../Assets/TeamLogos/Premier league/Man city.png" alt="Manchester City">
                        </div>
                    </div>

                    <!-- Team Name -->
                    <span class="fs-widget-form__team-name">Manchester City</span>

                    <!-- Form Badges Row -->
                    <div class="fs-widget-form__form-row">
                        <div class="fs-badge-form fs-badge-form--unknown">
                            <span class="fs-badge-form__text">?</span>
                        </div>
                        <div class="fs-badge-form fs-badge-form--win">
                            <span class="fs-badge-form__text">W</span>
                        </div>
                        <div class="fs-badge-form fs-badge-form--draw">
                            <span class="fs-badge-form__text">D</span>
                        </div>
                        <div class="fs-badge-form fs-badge-form--win">
                            <span class="fs-badge-form__text">W</span>
                        </div>
                        <div class="fs-badge-form fs-badge-form--lose">
                            <span class="fs-badge-form__text">L</span>
                        </div>
                        <div class="fs-badge-form fs-badge-form--win">
                            <span class="fs-badge-form__text">W</span>
                        </div>
                    </div>

                </div>

            </div>

        </div>
    </div>

</body>
</html>
