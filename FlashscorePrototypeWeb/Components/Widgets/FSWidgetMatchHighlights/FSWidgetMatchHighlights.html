<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSWidgetMatchHighlights - Widget Component</title>
    <link rel="stylesheet" href="FSWidgetMatchHighlights.css">
</head>
<body style="padding: 16px; background: #FFFFFF; max-width: 639px;">

    <!-- FSWidgetMatchHighlights Widget -->
    <div class="fs-widget-match-highlights">

        <!-- Item 1: Article / Report card -->
        <a href="#" class="fs-widget-match-highlights__item">
            <div class="fs-widget-match-highlights__thumbnail">
                <img src="../../../Assets/NewsImages/news_01.png" alt="Report thumbnail" class="fs-widget-match-highlights__thumbnail-img">
            </div>
            <div class="fs-widget-match-highlights__content">
                <div class="fs-widget-match-highlights__tag">REPORT</div>
                <p class="fs-widget-match-highlights__title">Manchester City vs Fulham: Post-match analysis and player ratings</p>
            </div>
        </a>

        <!-- Item 2: Video card -->
        <a href="#" class="fs-widget-match-highlights__item">
            <div class="fs-widget-match-highlights__thumbnail">
                <img src="../../../Assets/NewsImages/news_02.avif" alt="Match highlights video" class="fs-widget-match-highlights__thumbnail-img">
                <!-- Video Play Button -->
                <div class="fs-widget-match-highlights__play-icon">
                    <img src="../../../Assets/Icons/Action/Video/Play.svg" alt="" class="fs-widget-match-highlights__play-svg">
                </div>
            </div>
            <div class="fs-widget-match-highlights__content">
                <p class="fs-widget-match-highlights__title">Match highlights</p>
                <p class="fs-widget-match-highlights__source">Youtube</p>
            </div>
        </a>

    </div>

</body>
</html>
