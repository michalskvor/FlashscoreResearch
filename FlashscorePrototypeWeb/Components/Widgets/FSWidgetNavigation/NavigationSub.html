<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Sub - FSWidgetNavigation</title>
    <link rel="stylesheet" href="NavigationSub.css">
</head>
<body>
    <div style="padding: 24px; background-color: #EEEEEE;">
        <h1 style="margin-bottom: 24px; font-size: 24px;">Navigation Sub Component</h1>

        <!-- Navigation Sub -->
        <div class="nav-sub">
            <div class="nav-sub__content">
                <!-- Items container -->
                <div class="nav-sub__items">
                    <!-- FAVORITES - with badge -->
                    <button class="nav-sub__item">
                        <div class="nav-sub__item-container">
                            <div class="nav-sub__item-icon">
                                <img src="../../../Assets/Icons/Action/State/Favorite.svg" alt="Favorites">
                            </div>
                            <div class="nav-sub__item-text-badge">
                                <span class="nav-sub__item-text">Favorites</span>
                                <div class="nav-sub__item-badge">1</div>
                            </div>
                        </div>
                    </button>

                    <!-- FOOTBALL - Active -->
                    <div class="nav-sub__item nav-sub__item--active">
                        <div class="nav-sub__item-container">
                            <div class="nav-sub__item-icon">
                                <img src="../../../Assets/Icons/Sport/Soccer.svg" alt="Football">
                            </div>
                            <div class="nav-sub__item-text-badge">
                                <span class="nav-sub__item-text">Football</span>
                            </div>
                        </div>
                        <div class="nav-sub__item-underline"></div>
                    </div>

                    <!-- TENNIS - Inactive -->
                    <button class="nav-sub__item">
                        <div class="nav-sub__item-container">
                            <div class="nav-sub__item-icon">
                                <img src="../../../Assets/Icons/Sport/Tennis.svg" alt="Tennis">
                            </div>
                            <div class="nav-sub__item-text-badge">
                                <span class="nav-sub__item-text">Tennis</span>
                            </div>
                        </div>
                    </button>

                    <!-- BASKETBALL - Inactive -->
                    <button class="nav-sub__item">
                        <div class="nav-sub__item-container">
                            <div class="nav-sub__item-icon">
                                <img src="../../../Assets/Icons/Sport/Basketball.svg" alt="Basketball">
                            </div>
                            <div class="nav-sub__item-text-badge">
                                <span class="nav-sub__item-text">Basketball</span>
                            </div>
                        </div>
                    </button>

                    <!-- HOCKEY - Inactive -->
                    <button class="nav-sub__item">
                        <div class="nav-sub__item-container">
                            <div class="nav-sub__item-icon">
                                <img src="../../../Assets/Icons/Sport/Ice hockey.svg" alt="Hockey">
                            </div>
                            <div class="nav-sub__item-text-badge">
                                <span class="nav-sub__item-text">Hockey</span>
                            </div>
                        </div>
                    </button>

                    <!-- RUGBY UNION - Inactive -->
                    <button class="nav-sub__item">
                        <div class="nav-sub__item-container">
                            <div class="nav-sub__item-icon">
                                <img src="../../../Assets/Icons/Sport/Rugby union.svg" alt="Rugby Union">
                            </div>
                            <div class="nav-sub__item-text-badge">
                                <span class="nav-sub__item-text">Rugby union</span>
                            </div>
                        </div>
                    </button>

                    <!-- CRICKET - Inactive -->
                    <button class="nav-sub__item">
                        <div class="nav-sub__item-container">
                            <div class="nav-sub__item-icon">
                                <img src="../../../Assets/Icons/Sport/Cricket.svg" alt="Cricket">
                            </div>
                            <div class="nav-sub__item-text-badge">
                                <span class="nav-sub__item-text">Cricket</span>
                            </div>
                        </div>
                    </button>

                    <!-- BASEBALL - Inactive -->
                    <button class="nav-sub__item">
                        <div class="nav-sub__item-container">
                            <div class="nav-sub__item-icon">
                                <img src="../../../Assets/Icons/Sport/Baseball.svg" alt="Baseball">
                            </div>
                            <div class="nav-sub__item-text-badge">
                                <span class="nav-sub__item-text">Baseball</span>
                            </div>
                        </div>
                    </button>

                    
                </div>

                <!-- MORE button -->
                <div class="nav-sub__more">
                    <div class="nav-sub__more-container">
                        <span class="nav-sub__more-text">More</span>
                        <div class="nav-sub__more-icon">
                            <img src="../../../Assets/Icons/Action/Navigation/Arrow/Down.svg" alt="More">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom divider -->
            <div class="nav-sub__divider"></div>
        </div>
    </div>
</body>
</html>
