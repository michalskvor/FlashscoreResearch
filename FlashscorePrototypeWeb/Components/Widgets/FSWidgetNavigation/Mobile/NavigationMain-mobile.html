<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavigationMain - Mobile</title>
    <link rel="stylesheet" href="NavigationMain-mobile.css">
</head>
<body>
    <!-- Demo Container -->
    <div class="demo-container">
        <!-- NavigationMain - Mobile -->
        <div class="nav-main-mobile">
            <!-- Headline Section (Logo + Action Buttons) -->
            <div class="nav-main-mobile__headline">
                <!-- Logo -->
                <div class="nav-main-mobile__logo">
                    <img src="../../../../Assets/FlashscoreLogos/flashscore-default-negative.imageset/flashscore-default-negative.svg" alt="FlashScore">
                </div>

                <!-- Action Buttons -->
                <div class="nav-main-mobile__buttons">
                    <!-- Gift Button with Pulse -->
                    <button class="nav-main-mobile__button">
                        <img src="../../../../Assets/Icons/Action/State/Gift.svg" alt="Gift">
                        <div class="nav-main-mobile__button-pulse"></div>
                    </button>

                    <!-- Search Button -->
                    <button class="nav-main-mobile__button">
                        <img src="../../../../Assets/Icons/Action/Search.svg" alt="Search">
                    </button>

                    <!-- Burger Menu Button -->
                    <button class="nav-main-mobile__button">
                        <img src="../../../../Assets/Icons/Action/Navigation/Burger menu.svg" alt="Menu">
                    </button>
                </div>
            </div>

            <!-- Navigation Items (SCORES / NEWS) -->
            <div class="nav-main-mobile__items">
                <!-- SCORES - Active -->
                <div class="nav-main-mobile__item nav-main-mobile__item--active">
                    <div class="nav-main-mobile__item-container">
                        <div class="nav-main-mobile__item-icon">
                            <img src="../../../../Assets/Icons/Notification/Result.svg" alt="Scores">
                        </div>
                        <span class="nav-main-mobile__item-text">SCORES</span>
                    </div>
                    <div class="nav-main-mobile__item-underline"></div>
                </div>

                <!-- NEWS - Inactive -->
                <button class="nav-main-mobile__item">
                    <div class="nav-main-mobile__item-container">
                        <div class="nav-main-mobile__item-icon">
                            <img src="../../../../Assets/Icons/Action/Navigation/News.svg" alt="News">
                        </div>
                        <span class="nav-main-mobile__item-text">NEWS</span>
                    </div>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
