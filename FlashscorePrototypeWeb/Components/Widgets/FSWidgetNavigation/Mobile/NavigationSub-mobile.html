<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavigationSub - Mobile</title>
    <link rel="stylesheet" href="../../../Atoms/FSBadgeNotification/FSBadgeNotification.css">
    <link rel="stylesheet" href="NavigationSub-mobile.css">
</head>
<body>
    <!-- Demo Container -->
    <div class="demo-container">
        <!-- NavigationSub - Mobile -->
        <div class="nav-sub-mobile">
            <!-- Favorites Icon Button -->
            <button class="nav-sub-mobile__favorites">
                <div class="nav-sub-mobile__favorites-icon">
                    <img src="../../../../Assets/Icons/Action/State/Favorite.svg" alt="Favorites">
                    <div class="badge badge-primary nav-sub-mobile__favorites-badge">1</div>
                </div>
            </button>

            <!-- Sports Menu Items -->
            <div class="nav-sub-mobile__items">
                <!-- FOOTBALL - Active -->
                <div class="nav-sub-mobile__item nav-sub-mobile__item--active">
                    <span class="nav-sub-mobile__item-text">FOOTBALL</span>
                    <div class="nav-sub-mobile__item-underline"></div>
                </div>

                <!-- TENNIS - Inactive -->
                <button class="nav-sub-mobile__item">
                    <span class="nav-sub-mobile__item-text">TENNIS</span>
                </button>

                <!-- BASKETBALL - Inactive -->
                <button class="nav-sub-mobile__item">
                    <span class="nav-sub-mobile__item-text">BASKETBALL</span>
                </button>

                <!-- HOCKEY - Inactive -->
                <button class="nav-sub-mobile__item">
                    <span class="nav-sub-mobile__item-text">HOCKEY</span>
                </button>

                <!-- GOLF - Inactive -->
                <button class="nav-sub-mobile__item">
                    <span class="nav-sub-mobile__item-text">GOLF</span>
                </button>
            </div>

            <!-- More Button -->
            <button class="nav-sub-mobile__more">
                <img src="../../../../Assets/Icons/Action/Navigation/Arrow/Down.svg" alt="More">
            </button>
        </div>

        <!-- Divider -->
        <div class="nav-sub-mobile__divider"></div>
    </div>
</body>
</html>
