<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Topbar - FSWidgetNavigation</title>
    <link rel="stylesheet" href="NavigationTopbar.css">
</head>
<body>
    <div style="padding: 24px; background-color: #EEEEEE;">
        <h1 style="margin-bottom: 24px; font-size: 24px;">Navigation Topbar Component</h1>

        <!-- Navigation Topbar -->
        <div class="nav-topbar">
            <div class="nav-topbar__content">
                <!-- SEO text -->
                <div class="nav-topbar__seo">
                    <p>Football Live Scores, Latest Football Results, EPL, LaLiga, Serie A</p>
                </div>

                <!-- Banner / Ads -->
                <div class="nav-topbar__banner">
                    <div class="nav-topbar__banner-ad">
                        <img src="../../../Assets/BookmakerBanner/970x90/ad=Tipsport.png" alt="Advertisement">
                    </div>
                    <div class="nav-topbar__banner-label">
                        <span>Advertisement</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
