<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSWidgetMatchInformation - Widget Component</title>
    <link rel="stylesheet" href="../../Molecules/FSHeadersSection/FSHeadersSection.css">
    <link rel="stylesheet" href="FSWidgetMatchInformation.css">
</head>
<body style="padding: 16px; background: #FFFFFF; max-width: 639px;">

    <!-- FSWidgetMatchInformation Widget -->
    <div class="fs-widget-match-information">

        <!-- Section Header -->
        <div class="fs-headers-section">
            <div class="fs-headers-section__left">
                <span class="fs-headers-section__text">MATCH INFORMATION</span>
            </div>
            <div class="fs-headers-section__center"></div>
            <div class="fs-headers-section__right"></div>
        </div>

        <!-- Rows -->
        <div class="fs-widget-match-information__rows">

            <!-- Referee -->
            <div class="fs-widget-match-information__row">
                <img src="../../../Assets/Icons/Incidents/Whistle.svg" alt="" class="fs-widget-match-information__icon">
                <span class="fs-widget-match-information__label">Referee:</span>
                <div class="fs-widget-match-information__value">
                    <span class="fs-widget-match-information__value-main">Brooks. J</span>
                    <span class="fs-widget-match-information__value-suffix">&nbsp;(Eng)</span>
                </div>
            </div>

            <!-- Venue -->
            <div class="fs-widget-match-information__row">
                <img src="../../../Assets/Icons/Other/Venue.svg" alt="" class="fs-widget-match-information__icon">
                <span class="fs-widget-match-information__label">Venue:</span>
                <div class="fs-widget-match-information__value">
                    <span class="fs-widget-match-information__value-main">Brentford Community Stadion</span>
                    <span class="fs-widget-match-information__value-suffix">&nbsp;(London)</span>
                </div>
            </div>

            <!-- Capacity -->
            <div class="fs-widget-match-information__row">
                <img src="../../../Assets/Icons/Other/People.svg" alt="" class="fs-widget-match-information__icon">
                <span class="fs-widget-match-information__label">Capacity:</span>
                <div class="fs-widget-match-information__value">
                    <span class="fs-widget-match-information__value-main">88 966</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
