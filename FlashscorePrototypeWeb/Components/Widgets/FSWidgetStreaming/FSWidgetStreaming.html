<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSWidgetStreaming - Widget Component</title>
    <link rel="stylesheet" href="../../Molecules/FSHeadersSection/FSHeadersSection.css">
    <link rel="stylesheet" href="../../Atoms/FSButtonStream/FSButtonStream.css">
    <link rel="stylesheet" href="FSWidgetStreaming.css">
</head>
<body style="padding: 16px; background: #FFFFFF; max-width: 639px;">

    <!-- FSWidgetStreaming Widget -->
    <div class="fs-widget-streaming">

        <!-- Section Header -->
        <div class="fs-headers-section">
            <div class="fs-headers-section__left">
                <span class="fs-headers-section__text">Streaming</span>
            </div>
            <div class="fs-headers-section__center"></div>
            <div class="fs-headers-section__right"></div>
        </div>

        <!-- Streaming Sources -->
        <div class="fs-widget-streaming__body">
            <div class="fs-widget-streaming__sources">

                <a href="#" class="fs-button-stream">
                    <span class="fs-button-stream__label">Bet365</span>
                    <img src="../../../Assets/Icons/Action/External link.svg" alt="" class="fs-button-stream__icon">
                </a>

                <a href="#" class="fs-button-stream">
                    <span class="fs-button-stream__label">Chance</span>
                    <img src="../../../Assets/Icons/Action/External link.svg" alt="" class="fs-button-stream__icon">
                </a>

                <a href="#" class="fs-button-stream">
                    <span class="fs-button-stream__label">Tipsport</span>
                    <img src="../../../Assets/Icons/Action/External link.svg" alt="" class="fs-button-stream__icon">
                </a>

                

            </div>
        </div>
    </div>

</body>
</html>
