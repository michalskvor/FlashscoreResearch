<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSMomentum Component</title>
    <link rel="stylesheet" href="FSMomentum.css">
</head>
<body style="background: #F8F8F8; padding: 20px;">

    <div class="fs-momentum">
        <!-- Chart container -->
        <div class="fs-momentum__chart-container">
            <!-- Vertical divider lines -->
            <div class="fs-momentum__dividers">
                <div class="fs-momentum__divider" style="left: 16.67%;"></div>
                <div class="fs-momentum__divider" style="left: 33.33%;"></div>
                <div class="fs-momentum__divider" style="left: calc(50% - 2.5px);"></div>
                <div class="fs-momentum__divider" style="left: 66.67%;"></div>
                <div class="fs-momentum__divider" style="left: 83.33%;"></div>
                <div class="fs-momentum__divider" style="right: 0;"></div>
            </div>

            <!-- Center axis -->
            <div class="fs-momentum__axis"></div>

            <!-- Bars container -->
            <div class="fs-momentum__bars">
                <!-- First Half: 45 bars (minutes 1-45) -->
                <div class="fs-momentum__half">
                    <div class="fs-momentum__bar" data-value="60"></div>
                    <div class="fs-momentum__bar" data-value="-80"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-90"></div>
                    <div class="fs-momentum__bar" data-value="10"></div>
                    <div class="fs-momentum__bar" data-value="20"></div>
                    <div class="fs-momentum__bar" data-value="40"></div>
                    <div class="fs-momentum__bar" data-value="5"></div>
                    <div class="fs-momentum__bar" data-value="0"></div>
                    <div class="fs-momentum__bar" data-value="0"></div>
                    <div class="fs-momentum__bar" data-value="-5"></div>
                    <div class="fs-momentum__bar" data-value="-10"></div>
                    <div class="fs-momentum__bar" data-value="-30"></div>
                    <div class="fs-momentum__bar" data-value="80"></div>
                    <div class="fs-momentum__bar" data-value="60"></div>
                    <div class="fs-momentum__bar" data-value="70"></div>
                    <div class="fs-momentum__bar" data-value="80"></div>
                    <div class="fs-momentum__bar" data-value="70"></div>
                    <div class="fs-momentum__bar" data-value="50"></div>
                    <div class="fs-momentum__bar" data-value="60"></div>
                    <div class="fs-momentum__bar" data-value="-40"></div>
                    <div class="fs-momentum__bar" data-value="-20"></div>
                    <div class="fs-momentum__bar" data-value="-50"></div>
                    <div class="fs-momentum__bar" data-value="-60"></div>
                    <div class="fs-momentum__bar" data-value="-90"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-80"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-90"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-80"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                </div>

                <!-- Half-time gap: 5px -->
                <div class="fs-momentum__halftime-gap"></div>

                <!-- Second Half: 45 bars (minutes 46-90) -->
                <div class="fs-momentum__half">
                    <div class="fs-momentum__bar" data-value="0"></div>
                    <div class="fs-momentum__bar" data-value="0"></div>
                    <div class="fs-momentum__bar" data-value="0"></div>
                    <div class="fs-momentum__bar" data-value="0"></div>
                    <div class="fs-momentum__bar" data-value="10"></div>
                    <div class="fs-momentum__bar" data-value="20"></div>
                    <div class="fs-momentum__bar" data-value="-10"></div>
                    <div class="fs-momentum__bar" data-value="-30"></div>
                    <div class="fs-momentum__bar" data-value="-40"></div>
                    <div class="fs-momentum__bar" data-value="-50"></div>
                    <div class="fs-momentum__bar" data-value="80"></div>
                    <div class="fs-momentum__bar" data-value="90"></div>
                    <div class="fs-momentum__bar" data-value="100"></div>
                    <div class="fs-momentum__bar" data-value="100"></div>
                    <div class="fs-momentum__bar" data-value="90"></div>
                    <div class="fs-momentum__bar" data-value="100"></div>
                    <div class="fs-momentum__bar" data-value="100"></div>
                    <div class="fs-momentum__bar" data-value="100"></div>
                    <div class="fs-momentum__bar" data-value="100"></div>
                    <div class="fs-momentum__bar" data-value="100"></div>
                    <div class="fs-momentum__bar" data-value="90"></div>
                    <div class="fs-momentum__bar" data-value="100"></div>
                    <div class="fs-momentum__bar" data-value="100"></div>
                    <div class="fs-momentum__bar" data-value="100"></div>
                    <div class="fs-momentum__bar" data-value="100"></div>
                    <div class="fs-momentum__bar" data-value="80"></div>
                    <div class="fs-momentum__bar" data-value="90"></div>
                    <div class="fs-momentum__bar" data-value="100"></div>
                    <div class="fs-momentum__bar" data-value="90"></div>
                    <div class="fs-momentum__bar" data-value="80"></div>
                    <div class="fs-momentum__bar" data-value="70"></div>
                    <div class="fs-momentum__bar" data-value="80"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-80"></div>
                    <div class="fs-momentum__bar" data-value="-90"></div>
                    <div class="fs-momentum__bar" data-value="-60"></div>
                    <div class="fs-momentum__bar" data-value="-50"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                    <div class="fs-momentum__bar" data-value="-100"></div>
                </div>
            </div>
        </div>

        <!-- Time markers -->
        <div class="fs-momentum__time-markers">
            <span class="fs-momentum__time-marker">0'</span>
            <span class="fs-momentum__time-marker">15'</span>
            <span class="fs-momentum__time-marker">30'</span>
            <span class="fs-momentum__time-marker">45'</span>
            <span class="fs-momentum__time-marker">60'</span>
            <span class="fs-momentum__time-marker">75'</span>
            <span class="fs-momentum__time-marker">90'</span>
        </div>
    </div>

</body>
</html>
