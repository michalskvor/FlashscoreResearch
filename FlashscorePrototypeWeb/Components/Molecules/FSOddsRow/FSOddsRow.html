<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSOddsRow Component</title>
    <!-- Atom dependencies -->
    <link rel="stylesheet" href="../../Atoms/FSBadgeLive/FSBadgeLive.css">
    <link rel="stylesheet" href="../../Atoms/FSOddsCell/FSOddsCell.css">
    <!-- Molecule styles -->
    <link rel="stylesheet" href="FSOddsRow.css">
</head>
<body>
    <div class="demo-container">
        <h1>FSOddsRow Component</h1>
        <p>Molecule — Bookmaker odds row used in Match Detail. Composed of FSBadgeLive + FSOddsCell atoms.</p>

        <div class="demo-rows">

            <!-- ── Pre-match ───────────────────────────────────── -->
            <div class="fs-odds-row">
                <div class="fs-odds-row__odds-container">

                    <div class="fs-odds-row__bookmaker">
                        <img src="../../../Assets/BookmakerLogos/Bet365.png" alt="Bet365">
                    </div>

                    <div class="fs-odds-row__cells">

                        <!-- FSBadgeLive atom — Scheduled (outlined, gray) -->
                        <div class="fs-odds-row__badge-container">
                            <div class="fs-badge-live fs-badge-live--scheduled">
                                <span class="fs-badge-live__text">LIVE</span>
                            </div>
                        </div>

                        <!-- Pre-match odds cells (FSOddsCell atom) -->
                        <div class="fs-odds-cell">
                            <div class="fs-odds-cell__content">
                                <span class="fs-odds-cell__value">1.11</span>
                            </div>
                            <div class="fs-odds-cell__indicator">
                                <svg width="12" height="12" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M10.132 0L1 9.133L1.957 10.092L9.454 2.594V20H10.809V2.593L18.307 10.092L19.264 9.133L10.132 0Z" fill="#1AB546"/>
                                </svg>
                            </div>
                            <div class="fs-odds-cell__external-link">
                                <svg width="6" height="6" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M8.27441 0V1.36621H3.03711L1.36719 3.03613V16.959L3.03711 18.6328H16.9629L18.6328 16.9619V11.7246H20V17.5293L17.5283 19.998H2.4707L0 17.5244V2.46973L2.4707 0H8.27441ZM20 0V8.27441H18.6328V2.33398L10.8281 10.1377L9.86133 9.16992L17.666 1.36621H11.7246V0H20Z" fill="#555E61"/>
                                </svg>
                            </div>
                        </div>

                        <div class="fs-odds-cell">
                            <div class="fs-odds-cell__content">
                                <span class="fs-odds-cell__value">3.20</span>
                            </div>
                            <div class="fs-odds-cell__indicator">
                                <svg width="12" height="12" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M10.132 0L1 9.133L1.957 10.092L9.454 2.594V20H10.809V2.593L18.307 10.092L19.264 9.133L10.132 0Z" fill="#1AB546"/>
                                </svg>
                            </div>
                            <div class="fs-odds-cell__external-link">
                                <svg width="6" height="6" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M8.27441 0V1.36621H3.03711L1.36719 3.03613V16.959L3.03711 18.6328H16.9629L18.6328 16.9619V11.7246H20V17.5293L17.5283 19.998H2.4707L0 17.5244V2.46973L2.4707 0H8.27441ZM20 0V8.27441H18.6328V2.33398L10.8281 10.1377L9.86133 9.16992L17.666 1.36621H11.7246V0H20Z" fill="#555E61"/>
                                </svg>
                            </div>
                        </div>

                        <div class="fs-odds-cell">
                            <div class="fs-odds-cell__content">
                                <span class="fs-odds-cell__value">4.50</span>
                            </div>
                            <div class="fs-odds-cell__indicator">
                                <svg width="12" height="12" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M10.132 0L1 9.133L1.957 10.092L9.454 2.594V20H10.809V2.593L18.307 10.092L19.264 9.133L10.132 0Z" fill="#1AB546"/>
                                </svg>
                            </div>
                            <div class="fs-odds-cell__external-link">
                                <svg width="6" height="6" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M8.27441 0V1.36621H3.03711L1.36719 3.03613V16.959L3.03711 18.6328H16.9629L18.6328 16.9619V11.7246H20V17.5293L17.5283 19.998H2.4707L0 17.5244V2.46973L2.4707 0H8.27441ZM20 0V8.27441H18.6328V2.33398L10.8281 10.1377L9.86133 9.16992L17.666 1.36621H11.7246V0H20Z" fill="#555E61"/>
                                </svg>
                            </div>
                        </div>

                    </div><!-- /.fs-odds-row__cells -->
                </div><!-- /.fs-odds-row__odds-container -->
                <div class="fs-odds-row__divider"></div>
            </div><!-- /.fs-odds-row -->


            <!-- ── Live ────────────────────────────────────────── -->
            <div class="fs-odds-row fs-odds-row--live">
                <div class="fs-odds-row__odds-container">

                    <div class="fs-odds-row__bookmaker">
                        <img src="../../../Assets/BookmakerLogos/Bwin.png" alt="Bwin">
                    </div>

                    <div class="fs-odds-row__cells">

                        <!-- FSBadgeLive atom — Live (red fill, white) -->
                        <div class="fs-odds-row__badge-container">
                            <div class="fs-badge-live">
                                <span class="fs-badge-live__text">LIVE</span>
                            </div>
                        </div>

                        <!-- Live odds cells (FSOddsCell atom) -->
                        <div class="fs-odds-cell fs-odds-cell--live">
                            <div class="fs-odds-cell__content">
                                <span class="fs-odds-cell__value">1.11</span>
                            </div>
                            <div class="fs-odds-cell__indicator">
                                <svg width="12" height="12" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M10.132 0L1 9.133L1.957 10.092L9.454 2.594V20H10.809V2.593L18.307 10.092L19.264 9.133L10.132 0Z" fill="#1AB546"/>
                                </svg>
                            </div>
                            <div class="fs-odds-cell__external-link">
                                <svg width="6" height="6" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M8.27441 0V1.36621H3.03711L1.36719 3.03613V16.959L3.03711 18.6328H16.9629L18.6328 16.9619V11.7246H20V17.5293L17.5283 19.998H2.4707L0 17.5244V2.46973L2.4707 0H8.27441ZM20 0V8.27441H18.6328V2.33398L10.8281 10.1377L9.86133 9.16992L17.666 1.36621H11.7246V0H20Z" fill="#555E61"/>
                                </svg>
                            </div>
                        </div>

                        <div class="fs-odds-cell fs-odds-cell--live">
                            <div class="fs-odds-cell__content">
                                <span class="fs-odds-cell__value">3.20</span>
                            </div>
                            <div class="fs-odds-cell__indicator">
                                <svg width="12" height="12" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M10.132 0L1 9.133L1.957 10.092L9.454 2.594V20H10.809V2.593L18.307 10.092L19.264 9.133L10.132 0Z" fill="#1AB546"/>
                                </svg>
                            </div>
                            <div class="fs-odds-cell__external-link">
                                <svg width="6" height="6" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M8.27441 0V1.36621H3.03711L1.36719 3.03613V16.959L3.03711 18.6328H16.9629L18.6328 16.9619V11.7246H20V17.5293L17.5283 19.998H2.4707L0 17.5244V2.46973L2.4707 0H8.27441ZM20 0V8.27441H18.6328V2.33398L10.8281 10.1377L9.86133 9.16992L17.666 1.36621H11.7246V0H20Z" fill="#555E61"/>
                                </svg>
                            </div>
                        </div>

                        <div class="fs-odds-cell fs-odds-cell--live">
                            <div class="fs-odds-cell__content">
                                <span class="fs-odds-cell__value">4.50</span>
                            </div>
                            <div class="fs-odds-cell__indicator">
                                <svg width="12" height="12" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M10.132 0L1 9.133L1.957 10.092L9.454 2.594V20H10.809V2.593L18.307 10.092L19.264 9.133L10.132 0Z" fill="#1AB546"/>
                                </svg>
                            </div>
                            <div class="fs-odds-cell__external-link">
                                <svg width="6" height="6" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M8.27441 0V1.36621H3.03711L1.36719 3.03613V16.959L3.03711 18.6328H16.9629L18.6328 16.9619V11.7246H20V17.5293L17.5283 19.998H2.4707L0 17.5244V2.46973L2.4707 0H8.27441ZM20 0V8.27441H18.6328V2.33398L10.8281 10.1377L9.86133 9.16992L17.666 1.36621H11.7246V0H20Z" fill="#555E61"/>
                                </svg>
                            </div>
                        </div>

                    </div><!-- /.fs-odds-row__cells -->
                </div><!-- /.fs-odds-row__odds-container -->
                <div class="fs-odds-row__divider"></div>
            </div><!-- /.fs-odds-row--live -->


            <!-- ── Post-match ──────────────────────────────────── -->
            <div class="fs-odds-row fs-odds-row--post-match">
                <div class="fs-odds-row__odds-container">

                    <div class="fs-odds-row__bookmaker">
                        <img src="../../../Assets/BookmakerLogos/Unibet.png" alt="Unibet">
                    </div>

                    <div class="fs-odds-row__cells">

                        <!-- Empty spacer (no badge in post-match) -->
                        <div class="fs-odds-row__badge-placeholder"></div>

                        <!-- Post-match odds cells (FSOddsCell atom) -->
                        <div class="fs-odds-cell fs-odds-cell--post-match">
                            <div class="fs-odds-cell__content">
                                <span class="fs-odds-cell__value">1.11</span>
                            </div>
                            <div class="fs-odds-cell__external-link">
                                <svg width="6" height="6" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M8.27441 0V1.36621H3.03711L1.36719 3.03613V16.959L3.03711 18.6328H16.9629L18.6328 16.9619V11.7246H20V17.5293L17.5283 19.998H2.4707L0 17.5244V2.46973L2.4707 0H8.27441ZM20 0V8.27441H18.6328V2.33398L10.8281 10.1377L9.86133 9.16992L17.666 1.36621H11.7246V0H20Z" fill="#555E61"/>
                                </svg>
                            </div>
                        </div>

                        <div class="fs-odds-cell fs-odds-cell--post-match">
                            <div class="fs-odds-cell__content">
                                <span class="fs-odds-cell__value">3.20</span>
                            </div>
                            <div class="fs-odds-cell__external-link">
                                <svg width="6" height="6" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">

                                </svg>
                            </div>
                        </div>

                        <div class="fs-odds-cell fs-odds-cell--post-match">
                            <div class="fs-odds-cell__content">
                                <span class="fs-odds-cell__value">4.50</span>
                            </div>
                            <div class="fs-odds-cell__external-link">
                                <svg width="6" height="6" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M8.27441 0V1.36621H3.03711L1.36719 3.03613V16.959L3.03711 18.6328H16.9629L18.6328 16.9619V11.7246H20V17.5293L17.5283 19.998H2.4707L0 17.5244V2.46973L2.4707 0H8.27441ZM20 0V8.27441H18.6328V2.33398L10.8281 10.1377L9.86133 9.16992L17.666 1.36621H11.7246V0H20Z" fill="#555E61"/>
                                </svg>
                            </div>
                        </div>

                    </div><!-- /.fs-odds-row__cells -->
                </div><!-- /.fs-odds-row__odds-container -->
            </div><!-- /.fs-odds-row--post-match -->

        </div><!-- /.demo-rows -->
    </div>
</body>
</html>
